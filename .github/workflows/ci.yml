name: CI

on:
  pull_request:
  push:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: pnpm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'
          prefix-key: ci-v1

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        run: pnpm install

      - name: Lint (Biome)
        run: pnpm biome check

      - name: Lint (Clippy)
        run: cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets -- -D warnings

      - name: Type check
        run: pnpm vue-tsc --noEmit

      - name: Test
        run: pnpm vitest run

      - name: Rust tests (incl. OpenAPI snapshot)
        run: cargo test --manifest-path src-tauri/Cargo.toml

  # E2E (#702): 実アプリを xvfb 上の隔離プロファイルで起動し、
  # 外部アプリと同じ HTTP API 面 (#709) で駆動する
  e2e:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: pnpm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'
          prefix-key: e2e-v1

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf \
            xvfb imagemagick x11-apps

      - name: Install frontend dependencies
        run: pnpm install

      - name: Build debug binary
        run: cargo build --manifest-path src-tauri/Cargo.toml

      - name: Run E2E tests (xvfb)
        run: xvfb-run -a --server-args="-screen 0 1280x800x24" pnpm test:e2e
        env:
          NOTEDECK_E2E_SCREENSHOT: '1'
          NOTEDECK_E2E_VERBOSE: '1'
          # GPU なしランナーでは WebKitGTK が DMABUF/EGL 初期化に失敗して
          # WebView 生成前にクラッシュし、HTTP API (19820) が一度も開かない。
          # ソフトウェアレンダリングに落として回避する
          WEBKIT_DISABLE_DMABUF_RENDERER: '1'
          WEBKIT_DISABLE_COMPOSITING_MODE: '1'

      - name: Upload screenshot artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-screenshot
          path: e2e-artifacts/
          if-no-files-found: ignore

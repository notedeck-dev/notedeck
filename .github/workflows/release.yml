name: Release

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: pnpm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        run: pnpm install

      - name: Lint (Biome)
        run: pnpm biome check

      - name: Lint (Clippy)
        run: cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets -- -D warnings

      - name: Type check
        run: pnpm vue-tsc --noEmit

      - name: Test
        run: pnpm vitest run

  build:
    needs: check
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            rust_targets: aarch64-apple-darwin,x86_64-apple-darwin
            tauri_args: --target universal-apple-darwin --bundles app,dmg
          - platform: ubuntu-24.04
            rust_targets: ''
            tauri_args: --bundles appimage,deb
          - platform: windows-latest
            rust_targets: ''
            tauri_args: --bundles nsis

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: pnpm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_targets }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'
          prefix-key: v1

      - name: Install system dependencies (Linux)
        if: matrix.platform == 'ubuntu-24.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        run: pnpm install

      - name: Build
        run: pnpm tauri build ${{ matrix.tauri_args }}
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Patch AppImage - bundle mesa for portable EGL
        if: matrix.platform == 'ubuntu-24.04'
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          set -euo pipefail

          BUNDLE_DIR="${GITHUB_WORKSPACE}/src-tauri/target/release/bundle/appimage"
          APPIMAGE=$(find "$BUNDLE_DIR" -maxdepth 1 -name "*.AppImage" | head -1)
          APPIMAGE_NAME=$(basename "$APPIMAGE")

          if [ -z "$APPIMAGE" ]; then
            echo "ERROR: AppImage not found in $BUNDLE_DIR"
            exit 1
          fi

          echo "::group::Extract AppImage"
          WORK_DIR=$(mktemp -d)
          cd "$WORK_DIR"
          chmod +x "$APPIMAGE"
          "$APPIMAGE" --appimage-extract
          echo "::endgroup::"

          # linuxdeploy excludes mesa/EGL libs by default (they should come from host).
          # But the bundled WebKitGTK was built against THIS mesa version, so loading
          # the host's newer mesa causes an EGL ABI mismatch crash.
          # Fix: bundle mesa libs from the build env so WebKitGTK gets a matching EGL.
          echo "::group::Bundle mesa/EGL libraries"
          LIB_DIR="squashfs-root/usr/lib"
          MESA_LIBS=(
            libEGL.so.1
            libEGL_mesa.so.0
            libGLESv2.so.2
            libgbm.so.1
            libGL.so.1
            libGLdispatch.so.0
            libGLX.so.0
            libGLX_mesa.so.0
            libglapi.so.0
            libdrm.so.2
          )
          for lib in "${MESA_LIBS[@]}"; do
            SRC=$(find /usr/lib/x86_64-linux-gnu -maxdepth 1 \
              \( -name "$lib" -type f -o -name "$lib" -type l \) 2>/dev/null | head -1)
            if [ -n "$SRC" ]; then
              cp -Lv "$SRC" "$LIB_DIR/"
            else
              echo "WARN: $lib not found on build system"
            fi
          done
          echo "::endgroup::"

          # Force software rendering (llvmpipe) to avoid loading host DRI drivers
          # which would also have an ABI mismatch with the bundled mesa.
          echo "::group::Inject LIBGL_ALWAYS_SOFTWARE into AppRun"
          if head -1 squashfs-root/AppRun | grep -q "^#!"; then
            sed -i '/^exec /i export LIBGL_ALWAYS_SOFTWARE=1' squashfs-root/AppRun
          else
            mv squashfs-root/AppRun squashfs-root/AppRun.bin
            cat > squashfs-root/AppRun << 'WRAPPER'
          #!/bin/bash
          HERE="$(dirname "$(readlink -f "${0}")")"
          export LIBGL_ALWAYS_SOFTWARE=1
          exec "${HERE}/AppRun.bin" "$@"
          WRAPPER
            chmod +x squashfs-root/AppRun
          fi
          cat squashfs-root/AppRun
          echo "::endgroup::"

          echo "::group::Repackage AppImage"
          wget -q "https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage"
          chmod +x appimagetool-x86_64.AppImage
          ARCH=x86_64 ./appimagetool-x86_64.AppImage --appimage-extract-and-run \
            squashfs-root "$APPIMAGE"
          echo "::endgroup::"

          echo "::group::Regenerate updater artifacts"
          cd "$BUNDLE_DIR"
          rm -f "${APPIMAGE_NAME}.tar.gz" "${APPIMAGE_NAME}.tar.gz.sig"
          tar czf "${APPIMAGE_NAME}.tar.gz" "$APPIMAGE_NAME"
          cd "${GITHUB_WORKSPACE}"
          pnpm tauri signer sign "${BUNDLE_DIR}/${APPIMAGE_NAME}.tar.gz"
          echo "::endgroup::"

          rm -rf "$WORK_DIR"
          echo "=== Patched AppImage bundle ==="
          ls -lh "$BUNDLE_DIR/"

      - name: Get version
        id: version
        shell: bash
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Package (Linux)
        if: matrix.platform == 'ubuntu-24.04'
        run: |
          VERSION=${{ steps.version.outputs.version }}
          echo "=== Bundle contents ==="
          ls -la src-tauri/target/release/bundle/appimage/ || true
          ls -la src-tauri/target/release/bundle/deb/ || true
          cd src-tauri/target/release
          tar czf "${GITHUB_WORKSPACE}/NoteDeck-${VERSION}-linux-x64.tar.gz" notedeck
          cd "${GITHUB_WORKSPACE}"
          cp src-tauri/target/release/bundle/appimage/*.AppImage "NoteDeck-${VERSION}-linux-x64.AppImage"
          cp src-tauri/target/release/bundle/deb/*.deb "NoteDeck-${VERSION}-linux-x64.deb"
          # Updater artifacts (generated when TAURI_SIGNING_PRIVATE_KEY is set)
          cp src-tauri/target/release/bundle/appimage/*.AppImage.tar.gz "NoteDeck-${VERSION}-linux-x64.AppImage.tar.gz" 2>/dev/null || echo "WARN: AppImage updater bundle not found"
          cp src-tauri/target/release/bundle/appimage/*.AppImage.tar.gz.sig "NoteDeck-${VERSION}-linux-x64.AppImage.tar.gz.sig" 2>/dev/null || echo "WARN: AppImage updater signature not found"

      - name: Package (macOS)
        if: matrix.platform == 'macos-latest'
        run: |
          VERSION=${{ steps.version.outputs.version }}
          echo "=== Bundle contents ==="
          ls -la src-tauri/target/universal-apple-darwin/release/bundle/macos/ || true
          ls -la src-tauri/target/universal-apple-darwin/release/bundle/dmg/ || true
          cd src-tauri/target/universal-apple-darwin/release/bundle/macos
          zip -ry "${GITHUB_WORKSPACE}/NoteDeck-${VERSION}-macos-universal.zip" NoteDeck.app
          cd "${GITHUB_WORKSPACE}"
          cp src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg "NoteDeck-${VERSION}-macos-universal.dmg"
          # Updater artifacts (generated when TAURI_SIGNING_PRIVATE_KEY is set)
          cp src-tauri/target/universal-apple-darwin/release/bundle/macos/*.tar.gz "NoteDeck-${VERSION}-macos-universal.app.tar.gz" 2>/dev/null || echo "WARN: macOS updater bundle not found"
          cp src-tauri/target/universal-apple-darwin/release/bundle/macos/*.tar.gz.sig "NoteDeck-${VERSION}-macos-universal.app.tar.gz.sig" 2>/dev/null || echo "WARN: macOS updater signature not found"

      - name: Package (Windows)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          $version = '${{ steps.version.outputs.version }}'
          Write-Host "=== Bundle contents ==="
          Get-ChildItem "src-tauri\target\release\bundle\nsis\" -ErrorAction SilentlyContinue
          Compress-Archive -Path "src-tauri\target\release\notedeck.exe" -DestinationPath "NoteDeck-${version}-windows-x64.zip"
          Copy-Item "src-tauri\target\release\bundle\nsis\*.exe" "NoteDeck-${version}-windows-x64-setup.exe"
          # Updater artifacts (generated when TAURI_SIGNING_PRIVATE_KEY is set)
          $nsisZip = Get-ChildItem "src-tauri\target\release\bundle\nsis\*.nsis.zip" -ErrorAction SilentlyContinue
          if ($nsisZip) {
            Copy-Item $nsisZip.FullName "NoteDeck-${version}-windows-x64-setup.nsis.zip"
          } else { Write-Host "WARN: Windows updater bundle not found" }
          $nsisZipSig = Get-ChildItem "src-tauri\target\release\bundle\nsis\*.nsis.zip.sig" -ErrorAction SilentlyContinue
          if ($nsisZipSig) {
            Copy-Item $nsisZipSig.FullName "NoteDeck-${version}-windows-x64-setup.nsis.zip.sig"
          } else { Write-Host "WARN: Windows updater signature not found" }

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: NoteDeck-*

  publish:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Get version
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Download release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION=${{ steps.version.outputs.version }}
          mkdir -p assets
          # Download updater artifacts (may not exist if signing key was not set)
          gh release download "v${VERSION}" \
            --repo "${{ github.repository }}" \
            --pattern "*.sig" \
            --pattern "*.nsis.zip" \
            --pattern "*.AppImage.tar.gz" \
            --pattern "*.app.tar.gz" \
            --dir assets || echo "WARN: Some updater artifacts not found"
          echo "=== Downloaded assets ==="
          ls -la assets/ || true

      - name: Generate checksums
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION=${{ steps.version.outputs.version }}
          mkdir -p checksums
          gh release download "v${VERSION}" \
            --repo "${{ github.repository }}" \
            --dir checksums \
            --pattern "*.exe" \
            --pattern "*.dmg" \
            --pattern "*.deb" \
            --pattern "*.AppImage" \
            --pattern "*.tar.gz" || true
          cd checksums
          sha256sum * > SHA256SUMS.txt || true
          cat SHA256SUMS.txt
          gh release upload "v${VERSION}" SHA256SUMS.txt \
            --repo "${{ github.repository }}" \
            --clobber

      - name: Generate latest.json
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION=${{ steps.version.outputs.version }}
          REPO="${{ github.repository }}"
          DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          BASE_URL="https://github.com/${REPO}/releases/download/v${VERSION}"

          # Read signatures
          WIN_SIG=$(cat assets/*-windows-x64-setup.nsis.zip.sig 2>/dev/null || echo "")
          LINUX_SIG=$(cat assets/*-linux-x64.AppImage.tar.gz.sig 2>/dev/null || echo "")
          MACOS_SIG=$(cat assets/*-macos-universal.app.tar.gz.sig 2>/dev/null || echo "")

          # Fetch auto-generated release notes for updater dialog
          NOTES=$(gh release view "v${VERSION}" --repo "${{ github.repository }}" --json body -q '.body' 2>/dev/null | head -c 500 || echo "NoteDeck v${VERSION}")
          # Escape for JSON
          NOTES_ESCAPED=$(echo "$NOTES" | python3 -c 'import json,sys; print(json.dumps(sys.stdin.read()))')

          cat > latest.json << MANIFEST
          {
            "version": "${VERSION}",
            "notes": ${NOTES_ESCAPED},
            "pub_date": "${DATE}",
            "platforms": {
              "windows-x86_64": {
                "signature": "${WIN_SIG}",
                "url": "${BASE_URL}/NoteDeck-${VERSION}-windows-x64-setup.nsis.zip"
              },
              "linux-x86_64": {
                "signature": "${LINUX_SIG}",
                "url": "${BASE_URL}/NoteDeck-${VERSION}-linux-x64.AppImage.tar.gz"
              },
              "darwin-universal": {
                "signature": "${MACOS_SIG}",
                "url": "${BASE_URL}/NoteDeck-${VERSION}-macos-universal.app.tar.gz"
              }
            }
          }
          MANIFEST

      - name: Upload latest.json and publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION=${{ steps.version.outputs.version }}
          gh release upload "v${VERSION}" latest.json \
            --repo "${{ github.repository }}" \
            --clobber
          gh release edit "v${VERSION}" \
            --repo "${{ github.repository }}" \
            --draft=false

  aur:
    needs: publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Get version
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Update PKGBUILD
        run: |
          VERSION=${{ steps.version.outputs.version }}
          sed -i "s/^pkgver=.*/pkgver=${VERSION}/" packaging/aur/PKGBUILD
          sed -i "s/^pkgrel=.*/pkgrel=1/" packaging/aur/PKGBUILD

      - name: Publish to AUR
        uses: KSXGitHub/github-actions-deploy-aur@v4.1.3
        with:
          pkgname: misskey-notedeck-bin
          pkgbuild: packaging/aur/PKGBUILD
          assets: packaging/aur/notedeck.desktop
          commit_username: hitalin
          commit_email: hitalin@proton.me
          ssh_private_key: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          commit_message: "Update to ${{ steps.version.outputs.version }}"

  winget:
    needs: publish
    runs-on: windows-latest
    steps:
      - name: Get version
        id: version
        shell: bash
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Submit to winget
        uses: vedantmgoyal9/winget-releaser@v2
        with:
          identifier: Hitalin.NoteDeck
          installers-regex: '-windows-x64-setup\.exe$'
          version: ${{ steps.version.outputs.version }}
          token: ${{ secrets.WINGET_TOKEN }}
